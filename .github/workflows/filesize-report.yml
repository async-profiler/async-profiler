name: Filesize Report

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  post-filesize-comparison:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Install bsdtar
        run: sudo apt-get install -y libarchive-tools
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: async-profiler-*
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
      - name: Compare filesizes
        run: |
          export COMMIT_TAG=${GITHUB_SHA:0:7}
          ARCH_TAG=x64 ./devscripts/run-target filesize-report > filesize-report.md
          ARCH_TAG=arm64 ./devscripts/run-target filesize-report >> filesize-report.md
          OS_TAG=macos ARCH_TAG= PACKAGE_EXT=zip FAT_BINARY=true ./devscripts/run-target filesize-report >> filesize-report.md
        env:
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ github.token }}
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('filesize-report.md', 'utf8').trim();
            // Find the PR number from the workflow run
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
              state: 'open',
            });
            if (prs.data.length === 0) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prs.data[0].number,
              body: report,
            });
